<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon TCG Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#products">Products</a></li>
                <li><a href="#cart">Cart</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>
    <section class="hero">
        <h1>Welcome to the Pokémon TCG Store</h1>
        <p>Your one-stop shop for all Pokémon trading cards!</p>
    </section>
    <section class="filters">
        <h2>Filters</h2>
        <button onclick="filterProducts('all')">All</button>
        <button onclick="filterProducts('latest')">Latest</button>
        <button onclick="filterProducts('popular')">Popular</button>
    </section>
    <section class="product-grid" id="product-grid">
        <!-- Products will be loaded here from db/productos.json -->
    </section>
    <section class="cart" id="cart">
        <h2>Your Shopping Cart</h2>
        <div id="cart-items"></div>
        <button id="checkout">Checkout</button>
    </section>
    <footer>
        <p>&copy; 2026 Pokémon TCG Store. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
    <script>
        fetch('db/productos.json')
            .then(response => response.json())
            .then(data => {
                const productGrid = document.getElementById('product-grid');
                data.forEach(product => {
                    const productDiv = document.createElement('div');
                    productDiv.className = 'product';
                    productDiv.innerHTML = `<h3>${product.name}</h3><p>${product.description}</p><p>Price: ${product.price}</p><button onclick="addToCart('${product.id}')">Add to Cart</button>`;
                    productGrid.appendChild(productDiv);
                });
            });

        const cart = [];
        function addToCart(productId) {
            cart.push(productId);
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';
            cart.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.textContent = `Product ID: ${item}`;
                cartItems.appendChild(itemDiv);
            });
        }
    </script>
</body>
</html>
